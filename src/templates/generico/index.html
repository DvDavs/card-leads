<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{name}}</title>
    <style>
      :root {
        --primary: {{colors.primary}};
        --secondary: {{colors.secondary}};
        --accent: {{colors.accent}};
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--primary);
        color: #fff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 3rem 1rem;
      }
      .card { width: 100%; max-width: 30rem; text-align: center; }
      h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
      .tagline { color: var(--accent); font-weight: 600; margin-bottom: 1rem; }
      .about { color: #d1d5db; margin-bottom: 2rem; line-height: 1.5; }
      .links { display: flex; flex-direction: column; gap: 0.75rem; }
      .links a {
        display: block;
        padding: 0.9rem 1rem;
        border-radius: 0.75rem;
        background: var(--secondary);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.08s ease;
      }
      .links a:hover { transform: translateY(-2px); }
      .services { margin-top: 2rem; }
      .services h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 0.5rem; }
      .services ul { list-style: none; color: #e5e7eb; line-height: 1.7; }
      footer { margin-top: 2.5rem; color: #6b7280; font-size: 0.8rem; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>{{name}}</h1>
      {{#tagline}}<p class="tagline">{{tagline}}</p>{{/tagline}}
      {{#about}}<p class="about">{{about}}</p>{{/about}}

      <nav class="links">
        {{#links}}<a href="{{url}}" data-kind="{{kind}}">{{label}}</a>{{/links}}
        {{^hasLinks}}<a href="#">Sin enlaces todavia</a>{{/hasLinks}}
      </nav>

      {{#hasServices}}
      <section class="services">
        <h2>Servicios</h2>
        <ul>
          {{#services}}<li>{{.}}</li>{{/services}}
        </ul>
      </section>
      {{/hasServices}}

      <footer>{{name}}</footer>
    </main>
  </body>
</html>
