<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sitio web — vista previa</title>
<style>
  /*
   * Visor swipeable de sitios web (build-web). Junta las plantillas curadas
   * del rubro en un carrusel de <iframe> a pantalla completa: cada diseno se
   * ve TAL CUAL quedaria publicado (mismo iframe, sin marco de telefono ni
   * chrome extra). Flechas/dots/chip flotan ENCIMA como overlay. Sin bucle: al
   * llegar a una punta el boton de avance correspondiente queda disabled.
   *
   * A diferencia del visor de digital cards NO hay toggle de marca: las webs
   * aplican las CSS vars de marca directo (una sola paleta), asi que este visor
   * NO manda ni escucha postMessage.
   *
   * Lazy-load REAL (rendimiento movil, que es donde se vende): las webs cargan
   * Tailwind CDN + iconify + Google Fonts; 4 iframes cargando a la vez va lento
   * en el telefono. Los iframes arrancan con `data-src` (NO `src`) y solo cargan
   * la ventana visible + adyacentes (`ensureLoaded`).
   */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden}
  body{
    background:#000;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }

  /* ---------- carrusel a pantalla completa (el producto real) ---------- */
  .stage{position:fixed;inset:0;overflow:hidden;touch-action:pan-y}
  .track{
    display:flex;
    width:100%;height:100%;
    transition:transform .45s cubic-bezier(.22,.75,.3,1);
    will-change:transform;
  }
  .slide{flex:0 0 100%;height:100%;background:#fff}
  .slide iframe{width:100%;height:100%;border:0;display:block}

  /* ---------- overlay: flota encima del producto, no lo envuelve ---------- */
  .hud{position:fixed;inset:0;z-index:10;pointer-events:none}

  .nav{
    position:absolute;
    top:50%;transform:translateY(-50%);
    pointer-events:auto;
    display:grid;place-items:center;
    width:34px;height:34px;
    border:none;
    background:transparent;
    color:rgb(255 255 255 / 0.88);
    filter:drop-shadow(0 1px 2px rgb(0 0 0 / 0.55)) drop-shadow(0 0 6px rgb(0 0 0 / 0.22));
    cursor:pointer;
    transition:opacity .2s ease,transform .2s ease;
  }
  .nav-prev{left:max(6px,env(safe-area-inset-left))}
  .nav-next{right:max(6px,env(safe-area-inset-right))}
  .nav:hover{transform:translateY(-50%) scale(1.1)}
  .nav:active{transform:translateY(-50%) scale(.9)}
  .nav:disabled{opacity:.22;cursor:default;pointer-events:none}
  .nav svg{width:26px;height:26px}

  /* ---------- chip de diseno (UX de venta): "Lujo · 2/7", asi el cliente
     entiende que esta viendo VARIOS disenos para elegir. Va ABAJO, apilado
     sobre los dots (ambos pills glassy centrados = una sola unidad): arriba
     colisionaba con la barra de nav de cada web en desktop (tapaba un link del
     menu). En movil el menu de la web se oculta, pero abajo funciona en los
     dos. ------------------------------------------------------------------- */
  .chip{
    position:absolute;
    bottom:calc(max(16px,env(safe-area-inset-bottom)) + 42px);
    left:50%;transform:translateX(-50%);
    pointer-events:none;
    display:flex;align-items:center;gap:7px;
    padding:7px 13px;
    border-radius:999px;
    background:rgb(15 15 18 / 0.5);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    color:#f2f1ee;
    font-size:12px;font-weight:600;line-height:1;
    letter-spacing:.01em;
    white-space:nowrap;
    view-transition-name:web-chip;
  }
  .chip .chip-name{color:#fff}
  .chip .chip-pos{opacity:.6;font-weight:500;font-variant-numeric:tabular-nums}

  .dots{
    position:absolute;
    bottom:max(16px,env(safe-area-inset-bottom));
    left:50%;transform:translateX(-50%);
    pointer-events:auto;
    display:flex;gap:7px;align-items:center;
    padding:8px 10px;
    border-radius:999px;
    background:rgb(15 15 18 / 0.45);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    border:none;padding:0;
    background:rgb(255 255 255 / 0.35);
    cursor:pointer;
    transition:background .2s ease,transform .2s ease,opacity .2s ease;
  }
  .dot.active{background:#f2f1ee;transform:scale(1.3)}
  /* dot en el borde de la ventana visible (hay mas fuera, hacia ese lado):
     se ve mas chico/atenuado en vez de listar TODOS los disenos. */
  .dot.edge{transform:scale(.55);opacity:.45}

  @media (prefers-reduced-motion: reduce){
    .track{transition:none}
    .dot,.nav{transition:none}
    .chip{view-transition-name:none}
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="track">
      {{#pages}}
      <div class="slide" data-name="{{name}}" data-audience="{{audience}}">
        <iframe data-src="{{file}}" title="{{name}}" loading="lazy"></iframe>
      </div>
      {{/pages}}
    </div>
  </div>

  <div class="hud">
    <button class="nav nav-prev" type="button" aria-label="Diseño anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="nav nav-next" type="button" aria-label="Siguiente diseño">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div class="chip" id="chip" role="status" aria-live="polite">
      <span class="chip-name"></span><span class="chip-pos"></span>
    </div>

    <div class="dots" role="tablist" aria-label="Diseños disponibles"></div>
  </div>

  <script>
  (function () {
    var stage = document.querySelector(".stage");
    var track = document.querySelector(".track");
    var slides = Array.prototype.slice.call(track.children);
    var dotsWrap = document.querySelector(".dots");
    var prevBtn = document.querySelector(".nav-prev");
    var nextBtn = document.querySelector(".nav-next");
    var chip = document.getElementById("chip");
    var chipName = chip.querySelector(".chip-name");
    var chipPos = chip.querySelector(".chip-pos");
    var n = slides.length;

    /* Sin bucle: index va de 0 a n-1 nomas. Al llegar a una punta el boton
     * correspondiente se deshabilita (disabled), no da vuelta al otro lado. */
    var index = 0;

    /* Ventana de dots: si el pool crece, listar un dot por diseno da una barra
     * larga. Se muestran como maximo DOT_WINDOW_RADIUS*2+1; el dot en la punta
     * de la ventana se ve mas chico/atenuado (.edge) SOLO si de verdad hay mas
     * disenos de ese lado. */
    var DOT_WINDOW_RADIUS = 1;

    slides.forEach(function (slide, i) {
      var dot = document.createElement("button");
      dot.type = "button";
      dot.className = "dot";
      dot.setAttribute("role", "tab");
      dot.setAttribute("aria-label", "Ver " + (slide.dataset.name || "diseño " + (i + 1)));
      dot.addEventListener("click", function () {
        goTo(i);
      });
      dotsWrap.appendChild(dot);
    });
    var dots = Array.prototype.slice.call(dotsWrap.children);

    /* Lazy-load REAL: solo carga la ventana visible (i-1 .. i+1). El resto
     * espera a que el swipe/flecha las traiga, para no disparar 4 cargas de
     * Tailwind+iconify+Fonts a la vez en el telefono. */
    function ensureLoaded(i) {
      for (var k = Math.max(0, i - 1); k <= Math.min(n - 1, i + 1); k++) {
        var ifr = slides[k].querySelector("iframe");
        if (ifr && !ifr.src && ifr.dataset.src) ifr.src = ifr.dataset.src;
      }
    }

    function paint(withTransition) {
      track.style.transition = withTransition === false ? "none" : "transform .45s cubic-bezier(.22,.75,.3,1)";
      track.style.transform = "translateX(" + index * -100 + "%)";

      var windowSize = DOT_WINDOW_RADIUS * 2 + 1;
      var lo = n <= windowSize ? 0 : Math.max(0, Math.min(index - DOT_WINDOW_RADIUS, n - windowSize));
      var hi = Math.min(n - 1, lo + windowSize - 1);
      dots.forEach(function (d, i) {
        var inWindow = i >= lo && i <= hi;
        d.style.display = inWindow ? "" : "none";
        d.classList.toggle("active", i === index);
        d.classList.toggle("edge", inWindow && ((i === lo && lo > 0) || (i === hi && hi < n - 1)));
      });

      chipName.textContent = slides[index].dataset.name || "Diseño " + (index + 1);
      chipPos.textContent = " · " + (index + 1) + "/" + n;

      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === n - 1;
    }

    // Cerrojo anti doble-click: mientras "animating" es true se ignora
    // cualquier next/prev/teclado nuevo, para no pisar la transicion en curso.
    var animating = false;

    function goTo(i) {
      if (animating) return;
      if (i < 0 || i > n - 1) return;
      animating = true;
      index = i;
      ensureLoaded(index);
      if (document.startViewTransition) {
        document.startViewTransition(function () {
          paint(true);
        });
      } else {
        paint(true);
      }
    }

    track.addEventListener("transitionend", function (e) {
      if (e.target !== track) return;
      animating = false;
    });

    prevBtn.addEventListener("click", function () {
      goTo(index - 1);
    });
    nextBtn.addEventListener("click", function () {
      goTo(index + 1);
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "ArrowLeft") goTo(index - 1);
      if (e.key === "ArrowRight") goTo(index + 1);
    });

    /* Swipe: pointerdown arranca el seguimiento; recien si el gesto se
     * confirma horizontal (supera el umbral) se llama setPointerCapture, asi
     * un tap normal sobre un boton DENTRO de la web (wa.me, tel:, mailto:)
     * llega intacto al iframe en vez de ser interceptado. */
    var dragging = false, captured = false, pointerId = null;
    var startX = 0, startY = 0, dx = 0, stageWidth = 0;
    var THRESHOLD_PX = 8;
    var SWIPE_RATIO = 0.18;

    track.addEventListener("pointerdown", function (e) {
      dragging = true;
      captured = false;
      pointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      dx = 0;
      stageWidth = stage.getBoundingClientRect().width;
    });

    track.addEventListener("pointermove", function (e) {
      if (!dragging || e.pointerId !== pointerId) return;
      var deltaX = e.clientX - startX;
      var deltaY = e.clientY - startY;
      if (!captured) {
        if (Math.abs(deltaX) < THRESHOLD_PX || Math.abs(deltaX) < Math.abs(deltaY)) return;
        captured = true;
        track.setPointerCapture(pointerId);
        track.style.transition = "none";
      }
      dx = deltaX;
      track.style.transform = "translateX(calc(" + index * -100 + "% + " + dx + "px))";
      e.preventDefault();
    });

    function endDrag() {
      if (!dragging) return;
      dragging = false;
      if (!captured) return;
      captured = false;
      var moved = -dx > stageWidth * SWIPE_RATIO ? 1 : dx > stageWidth * SWIPE_RATIO ? -1 : 0;
      goTo(index + moved);
    }

    track.addEventListener("pointerup", endDrag);
    track.addEventListener("pointercancel", endDrag);
    track.addEventListener("pointerleave", function () {
      if (dragging && !captured) dragging = false;
    });

    paint(false);
    ensureLoaded(index); // primera carga: la visible + su adyacente
  })();
  </script>
</body>
</html>
