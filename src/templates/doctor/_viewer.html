<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sitio web — vista previa</title>
<style>
  /*
   * Visor swipeable de sitios web (build-web). Junta las plantillas del pool
   * del rubro en un carrusel de <iframe> a pantalla completa: cada diseno se
   * ve TAL CUAL quedaria publicado (mismo iframe, sin marco de telefono ni
   * chrome extra). El HUD flota ENCIMA como overlay. Sin bucle: al llegar a
   * una punta la flecha correspondiente queda disabled.
   *
   * HUD: un unico "dock" inferior centrado agrupa flechas + dots + nombre y
   * contador del diseno ("Lujo · 2 / 7", UX de venta: el cliente entiende que
   * esta viendo VARIOS disenos para elegir). El boton "Tarjeta digital", el
   * "?" y la burbuja de marca comparten los mismos tokens (--glass-*) para
   * que todo se lea como UNA interfaz.
   *
   * Toggle "Ver con los colores de tu marca" (mismo protocolo que el visor de
   * digital cards): cada pagina declara su paleta ORIGINAL en `:root` y la de
   * MARCA en `:root[data-brand]`; build-web le inyecta un listener
   * (`injectBrandToggle`) y este visor le manda el estado por postMessage
   * (`dc-brand`). El handshake `dc-brand-ready` es CRITICO aca: como los
   * iframes cargan lazy, un slide que recien carga avisa que arranco y se le
   * reenvia el estado actual (solo a ese, para no reiniciar al resto).
   *
   * Lazy-load REAL (rendimiento movil, que es donde se vende): las webs cargan
   * Tailwind CDN + iconify + Google Fonts; 7 iframes cargando a la vez va lento
   * en el telefono. Los iframes arrancan con `data-src` (NO `src`) y solo cargan
   * la ventana visible + adyacentes (`ensureLoaded`).
   */
  :root{
    --glass-bg:rgb(15 15 18 / 0.62);
    --glass-bg-hover:rgb(30 30 36 / 0.75);
    --glass-line:rgb(255 255 255 / 0.14);
    --ink:#f2f1ee;
    --ink-dim:rgb(242 241 238 / 0.58);
    --accent:#3d6fd6;
    --accent-strong:#2f5ec0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden}
  body{
    background:#000;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }

  /* ---------- carrusel a pantalla completa (el producto real) ---------- */
  .stage{position:fixed;inset:0;overflow:hidden;touch-action:pan-y}
  .track{
    display:flex;
    width:100%;height:100%;
    will-change:transform;
  }
  .slide{flex:0 0 100%;height:100%;background:#fff}
  .slide iframe{width:100%;height:100%;border:0;display:block}

  /* ---------- overlay: flota encima del producto, no lo envuelve ---------- */
  .hud{position:fixed;inset:0;z-index:10;pointer-events:none;user-select:none;-webkit-user-select:none}

  /* Dock inferior: flechas + (nombre · contador) + dots en un solo pill. */
  .dock{
    position:absolute;
    bottom:max(14px,env(safe-area-inset-bottom));
    left:50%;transform:translateX(-50%);
    pointer-events:auto;
    display:flex;align-items:center;gap:2px;
    padding:6px;
    max-width:calc(100vw - 20px);
    border-radius:999px;
    border:1px solid var(--glass-line);
    background:var(--glass-bg);
    backdrop-filter:blur(16px) saturate(1.4);
    -webkit-backdrop-filter:blur(16px) saturate(1.4);
    box-shadow:0 8px 32px rgb(0 0 0 / 0.35), inset 0 1px 0 rgb(255 255 255 / 0.06);
  }
  .nav{
    width:40px;height:40px;flex:none;
    display:grid;place-items:center;
    border:none;border-radius:50%;
    background:transparent;
    color:var(--ink);
    cursor:pointer;
    transition:background .2s ease,opacity .2s ease,transform .15s ease;
  }
  .nav:hover{background:rgb(255 255 255 / 0.1)}
  .nav:active{transform:scale(.88)}
  .nav:disabled{opacity:.25;cursor:default;pointer-events:none}
  .nav svg{width:22px;height:22px}
  .dock-center{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:2px 12px;min-width:118px;
  }
  .dock-label{
    display:flex;align-items:baseline;gap:7px;
    font-size:11.5px;line-height:1;white-space:nowrap;
  }
  .dock-name{font-weight:650;color:#fff;letter-spacing:.01em}
  .dock-pos{color:var(--ink-dim);font-weight:500;font-variant-numeric:tabular-nums}
  .dots{display:flex;gap:6px;align-items:center}
  .dot{
    width:6px;height:6px;border-radius:999px;
    border:none;padding:0;
    background:rgb(255 255 255 / 0.32);
    cursor:pointer;
    transition:width .25s ease,background .25s ease,transform .25s ease,opacity .25s ease;
  }
  .dot:hover{background:rgb(255 255 255 / 0.55)}
  /* dot activo: se estira a pildora (patron page-control), mas claro que solo
     agrandar el punto. */
  .dot.active{width:18px;background:#fff}
  /* dot en el borde de la ventana visible (hay mas fuera, hacia ese lado):
     se ve mas chico/atenuado en vez de listar TODOS los disenos. */
  .dot.edge{transform:scale(.65);opacity:.5}

  /* ---------- toggle "Ver con los colores de tu marca" (portado del visor
     de digital cards: icono compacto, el aviso aparece como toast y se apaga
     solo — no tapa el header de la web). Arranca MAS ABAJO del borde superior
     (para no tapar el boton de menu "sandwich" que traen las webs arriba a la
     derecha) y es una BURBUJA ARRASTRABLE (ver drag JS). ---------- */
  .brand-toggle{
    position:absolute;
    top:calc(max(10px,env(safe-area-inset-top)) + 68px);
    right:max(10px,env(safe-area-inset-right));
    pointer-events:auto;
    display:flex;flex-direction:column;gap:8px;
    touch-action:none;
  }
  .brand-toggle.dragging{transition:none}
  .brand-toggle.dragging .brand-btn{cursor:grabbing;transform:scale(1.06)}
  .brand-btn{
    width:40px;height:40px;flex:none;
    border-radius:50%;
    display:grid;place-items:center;
    border:1px solid var(--glass-line);
    background:var(--glass-bg);
    backdrop-filter:blur(16px) saturate(1.4);
    -webkit-backdrop-filter:blur(16px) saturate(1.4);
    box-shadow:0 4px 18px rgb(0 0 0 / 0.3);
    color:var(--ink);
    cursor:grab;
    touch-action:none;
    transition:background .2s ease,transform .2s ease,box-shadow .2s ease;
  }
  .brand-btn:hover{background:var(--glass-bg-hover)}
  .brand-btn:active{transform:scale(.92)}
  .brand-btn[aria-pressed="true"]{
    background:linear-gradient(135deg,#4f83f7,var(--accent-strong));
    border-color:rgb(255 255 255 / 0.35);
    box-shadow:0 4px 16px rgb(61 111 214 / 0.5);
  }
  .brand-btn svg{width:19px;height:19px}
  .brand-toast{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    margin:0;
    width:max-content;
    max-width:min(230px,68vw);
    padding:8px 12px;
    border-radius:12px;
    border:1px solid var(--glass-line);
    background:rgb(15 15 18 / 0.8);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    color:var(--ink);
    font-size:11px;
    line-height:1.35;
    text-align:right;
    opacity:0;
    transform:translateY(-4px);
    pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;
  }
  .brand-toast.show{opacity:1;transform:translateY(0)}
  .brand-toast.warn{border-color:rgb(255 200 120 / 0.32);background:rgb(140 60 10 / 0.8);color:#fff3e0}
  .brand-toggle.toast-left .brand-toast{left:0;right:auto;text-align:left}

  /* ---------- esquina inferior izquierda: "volver a la tarjeta" + "?" (zona
     libre; el resto del HUD esta a la derecha/centro). En pantallas angostas
     el dock centrado ocupa casi todo el ancho, asi que la esquina se apila
     ARRIBA del dock para no encimarse. ---------- */
  .corner{
    position:absolute;
    bottom:max(14px,env(safe-area-inset-bottom));
    left:max(10px,env(safe-area-inset-left));
    pointer-events:auto;
    display:flex;align-items:center;gap:8px;
  }
  @media (max-width:560px){
    .corner{bottom:calc(max(14px,env(safe-area-inset-bottom)) + 66px)}
  }
  .back-dc{
    display:inline-flex;align-items:center;gap:7px;
    height:40px;padding:0 15px 0 12px;
    border-radius:999px;
    border:1px solid var(--glass-line);
    background:var(--glass-bg);
    backdrop-filter:blur(16px) saturate(1.4);
    -webkit-backdrop-filter:blur(16px) saturate(1.4);
    box-shadow:0 4px 18px rgb(0 0 0 / 0.3);
    color:var(--ink);text-decoration:none;
    font-size:12.5px;font-weight:600;line-height:1;white-space:nowrap;
    transition:background .2s ease,transform .2s ease;
  }
  .back-dc:hover{background:var(--glass-bg-hover)}
  .back-dc:active{transform:scale(.96)}
  .back-dc svg{width:16px;height:16px}
  .help-btn{
    width:40px;height:40px;flex:none;
    border-radius:50%;
    display:grid;place-items:center;
    border:1px solid var(--glass-line);
    background:var(--glass-bg);
    backdrop-filter:blur(16px) saturate(1.4);
    -webkit-backdrop-filter:blur(16px) saturate(1.4);
    box-shadow:0 4px 18px rgb(0 0 0 / 0.3);
    color:var(--ink);
    font:600 16px/1 system-ui,sans-serif;
    cursor:pointer;
    transition:background .2s ease,transform .2s ease;
  }
  .help-btn:hover{background:var(--glass-bg-hover)}
  .help-btn:active{transform:scale(.92)}

  /* ---------- vista guiada (coach-marks): mismo patron que el visor de
     digital cards. Overlay oscuro con un reflector sobre el elemento del paso
     + globo con el texto; posicion por getBoundingClientRect (sigue a la
     burbuja de marca aunque se arrastre). ---------- */
  .tour{position:fixed;inset:0;z-index:50;pointer-events:auto;display:none}
  .tour.open{display:block}
  .tour.no-spot{background:rgb(6 6 10 / 0.72)}
  .tour-spot{
    position:absolute;left:0;top:0;width:0;height:0;
    border-radius:18px;
    box-shadow:0 0 0 9999px rgb(6 6 10 / 0.72);
    transition:all .32s cubic-bezier(.22,.75,.3,1);
    pointer-events:none;
  }
  .tour.no-spot .tour-spot{display:none}
  /* Dedito animado: demuestra el gesto de swipe durante el paso "hint:swipe".
     Centrado fijo en pantalla (el target de ese paso es .stage = pantalla
     completa), asi no hace falta reposicionarlo por JS. */
  .swipe-hint{
    position:absolute;
    top:50%;left:50%;
    width:44px;height:44px;
    margin:-22px 0 0 -22px;
    display:none;
    align-items:center;justify-content:center;
    font-size:30px;
    filter:drop-shadow(0 2px 6px rgb(0 0 0 / 0.5));
    pointer-events:none;
  }
  .swipe-hint.on{display:flex;animation:swipeHand 1.4s ease-in-out infinite}
  @keyframes swipeHand{
    0%{transform:translateX(-38px);opacity:.35}
    50%{transform:translateX(38px);opacity:1}
    100%{transform:translateX(-38px);opacity:.35}
  }
  .tour-pop{
    position:absolute;
    width:min(300px,84vw);
    padding:16px 16px 12px;
    border-radius:16px;
    border:1px solid var(--glass-line);
    background:rgb(20 20 24 / 0.94);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    color:var(--ink);
    box-shadow:0 12px 40px rgb(0 0 0 / 0.5);
    transition:top .3s ease,left .3s ease;
  }
  .tour-title{margin:0 0 5px;font-size:15px;font-weight:700;letter-spacing:.01em}
  .tour-text{margin:0;font-size:13px;line-height:1.45;color:rgb(242 241 238 / 0.82)}
  .tour-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .tour-dots{display:flex;gap:6px;align-items:center}
  .tour-dots i{width:6px;height:6px;border-radius:50%;background:rgb(255 255 255 / 0.28);transition:background .2s,transform .2s}
  .tour-dots i.on{background:var(--ink);transform:scale(1.3)}
  .tour-skip{
    border:none;background:transparent;padding:6px 2px;
    color:rgb(242 241 238 / 0.55);font-size:12px;cursor:pointer;
  }
  .tour-skip:hover{color:rgb(242 241 238 / 0.85)}
  .tour-next{
    border:none;border-radius:999px;
    padding:8px 16px;
    background:var(--accent);color:#fff;
    font-size:13px;font-weight:600;cursor:pointer;
    transition:background .2s,transform .2s;
  }
  .tour-next:hover{background:var(--accent-strong)}
  .tour-next:active{transform:scale(.95)}

  @media (prefers-reduced-motion: reduce){
    .dot,.nav,.brand-btn,.tour-spot,.tour-pop{transition:none}
    .swipe-hint{animation:none}
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="track">
      {{#pages}}
      <div class="slide" data-name="{{name}}" data-audience="{{audience}}">
        <iframe data-src="{{file}}" title="{{name}}" loading="lazy"></iframe>
      </div>
      {{/pages}}
    </div>
  </div>

  <div class="hud">
    <div class="dock" role="group" aria-label="Navegación de diseños">
      <button class="nav nav-prev" type="button" aria-label="Diseño anterior" title="Diseño anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="dock-center">
        <div class="dock-label" aria-live="polite">
          <span class="dock-name"></span><span class="dock-pos"></span>
        </div>
        <div class="dots" role="tablist" aria-label="Diseños disponibles"></div>
      </div>
      <button class="nav nav-next" type="button" aria-label="Siguiente diseño" title="Siguiente diseño">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="brand-toggle" id="brandToggle">
      <button type="button" class="brand-btn" id="brandBtn" aria-pressed="false" aria-label="Ver con los colores de tu marca" title="Ver con los colores de tu marca">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a9 9 0 1 0 0 18c1.4 0 2-.9 2-1.9 0-.5-.2-.9-.6-1.3-.4-.4-.5-.9-.2-1.4.3-.5.9-.6 1.5-.6H16a4 4 0 0 0 4-4c0-5-3.6-8.8-8-8.8Z"/><circle cx="7.5" cy="10.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="10.3" cy="7" r="1.15" fill="currentColor" stroke="none"/><circle cx="14.3" cy="7.3" r="1.15" fill="currentColor" stroke="none"/><circle cx="16.8" cy="10.8" r="1.15" fill="currentColor" stroke="none"/></svg>
      </button>
      <p class="brand-toast" id="brandToast" role="status"></p>
    </div>

    <div class="corner">
      <!-- Volver al visor de la tarjeta digital (carpeta hermana dc/). El
           enlace es relativo: funciona igual en la previsualizacion local y
           publicado (deploy sube dc/ y web/ con la misma estructura). -->
      <a class="back-dc" id="backDc" href="../dc/index.html" aria-label="Volver a la tarjeta digital">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        <span>Tarjeta digital</span>
      </a>
      <button type="button" class="help-btn" id="helpBtn" aria-label="Ver la guía de nuevo" title="Ver la guía de nuevo">?</button>
    </div>
  </div>

  <!-- Vista guiada (coach-marks). Mismo patron que el visor de digital cards. -->
  <div class="tour" id="tour" role="dialog" aria-modal="true" aria-label="Guía rápida">
    <div class="tour-spot" id="tourSpot"></div>
    <div class="swipe-hint" id="swipeHint" aria-hidden="true">👆</div>
    <div class="tour-pop" id="tourPop">
      <p class="tour-title" id="tourTitle"></p>
      <p class="tour-text" id="tourText"></p>
      <div class="tour-actions">
        <button type="button" class="tour-skip" id="tourSkip">Saltar</button>
        <div class="tour-dots" id="tourDots" aria-hidden="true"></div>
        <button type="button" class="tour-next" id="tourNext">Siguiente</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var stage = document.querySelector(".stage");
    var track = document.querySelector(".track");
    var slides = Array.prototype.slice.call(track.children);
    var dotsWrap = document.querySelector(".dots");
    var prevBtn = document.querySelector(".nav-prev");
    var nextBtn = document.querySelector(".nav-next");
    var dockName = document.querySelector(".dock-name");
    var dockPos = document.querySelector(".dock-pos");
    var n = slides.length;

    /* ================= motor del carrusel =================
     * Basado en POSICION (px), no en index + cerrojo de transicion. El diseno
     * anterior (flag `animating` liberado por transitionend) se trababa: si la
     * transicion no disparaba (transform sin cambio neto, drag soltado en el
     * borde, view transition pisando la CSS transition) el flag quedaba en true
     * para siempre y el track moria a mitad de camino. Aca no hay cerrojo:
     * cualquier gesto/click INTERRUMPE la animacion en curso leyendo la
     * posicion real del computed style y sigue desde ahi; al soltar SIEMPRE se
     * asienta en un slide valido (clamp + snap), asi que no existe estado
     * "a la mitad". */
    var EASE = "cubic-bezier(.22,.75,.3,1)";
    var DURATION_MS = 420;
    var reduceMotion = false;
    try { reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (_) {}

    /* Sin bucle: index va de 0 a n-1 nomas. Al llegar a una punta la flecha
     * correspondiente se deshabilita (disabled), no da vuelta al otro lado. */
    var index = 0;

    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
    function stageWidth() { return stage.getBoundingClientRect().width; }

    // Posicion REAL del track en px, incluso a mitad de una animacion: el
    // computed style devuelve la matriz interpolada del frame actual.
    function currentX() {
      var t = getComputedStyle(track).transform;
      if (!t || t === "none") return 0;
      var parts = t.slice(t.indexOf("(") + 1, -1).split(",");
      return parts.length >= 16 ? parseFloat(parts[12]) : parseFloat(parts[4]);
    }

    function setX(px, animate) {
      track.style.transition = animate && !reduceMotion
        ? "transform " + DURATION_MS + "ms " + EASE
        : "none";
      track.style.transform = "translate3d(" + px + "px,0,0)";
    }

    function goTo(i, animate) {
      index = clamp(i, 0, n - 1);
      ensureLoaded(index);
      setX(-index * stageWidth(), animate !== false);
      syncHud();
    }

    /* Ventana de dots: si el pool crece, listar un dot por diseno da una barra
     * larga. Se muestran como maximo DOT_WINDOW_RADIUS*2+1; el contador
     * "2 / 7" del dock dice la posicion absoluta. El dot en la punta de la
     * ventana se ve mas chico/atenuado (.edge) SOLO si de verdad hay mas
     * disenos de ese lado. */
    var DOT_WINDOW_RADIUS = 1;

    slides.forEach(function (slide, i) {
      var dot = document.createElement("button");
      dot.type = "button";
      dot.className = "dot";
      dot.setAttribute("role", "tab");
      dot.setAttribute("aria-label", "Ver " + (slide.dataset.name || "diseño " + (i + 1)));
      dot.addEventListener("click", function () {
        goTo(i);
      });
      dotsWrap.appendChild(dot);
    });
    var dots = Array.prototype.slice.call(dotsWrap.children);

    /* Lazy-load REAL: solo carga la ventana visible (i-1 .. i+1). El resto
     * espera a que el swipe/flecha las traiga, para no disparar cargas de
     * Tailwind+iconify+Fonts a la vez en el telefono. */
    function ensureLoaded(i) {
      for (var k = Math.max(0, i - 1); k <= Math.min(n - 1, i + 1); k++) {
        var ifr = slides[k].querySelector("iframe");
        if (ifr && !ifr.src && ifr.dataset.src) {
          ifr.src = ifr.dataset.src;
          whenIframeReady(ifr, bridgeIframeSwipe);
        }
      }
    }

    function syncHud() {
      var windowSize = DOT_WINDOW_RADIUS * 2 + 1;
      var lo = n <= windowSize ? 0 : Math.max(0, Math.min(index - DOT_WINDOW_RADIUS, n - windowSize));
      var hi = Math.min(n - 1, lo + windowSize - 1);
      dots.forEach(function (d, i) {
        var inWindow = i >= lo && i <= hi;
        d.style.display = inWindow ? "" : "none";
        d.classList.toggle("active", i === index);
        d.setAttribute("aria-selected", String(i === index));
        d.classList.toggle("edge", inWindow && ((i === lo && lo > 0) || (i === hi && hi < n - 1)));
      });

      dockName.textContent = slides[index].dataset.name || "Diseño " + (index + 1);
      dockPos.textContent = (index + 1) + " / " + n;

      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === n - 1;
    }

    prevBtn.addEventListener("click", function () {
      goTo(index - 1);
    });
    nextBtn.addEventListener("click", function () {
      goTo(index + 1);
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "ArrowLeft") goTo(index - 1);
      if (e.key === "ArrowRight") goTo(index + 1);
    });

    /* ================= swipe =================
     * pointerdown arranca el seguimiento; recien si el gesto se confirma
     * horizontal (supera el umbral) se toma el control, asi un tap normal
     * sobre un boton DENTRO de la web (wa.me, tel:, mailto:) llega intacto.
     *
     * Ademas del stage (los margenes alrededor del iframe), el swipe se
     * engancha DENTRO de cada iframe (mismo origen: `data-src` relativo,
     * mismo host que el visor). Un <iframe> es un browsing context aparte: el
     * navegador entrega el toque a SU documento, nunca al padre; sin este
     * puente el swipe queda muerto en el telefono (el iframe ocupa TODA la
     * pantalla). El puente se engancha desde ensureLoaded, cuando cada iframe
     * lazy termina de cargar (ver whenIframeReady).
     *
     * CLAVE del puente: los eventos del iframe traen clientX relativo a SU
     * viewport, y ese viewport SE MUEVE junto con el track durante el drag.
     * Usarlos crudos (como hacia la version anterior) mete un lazo de
     * feedback: el track corre "atras" del dedo, con lag y saltos. toStageX/Y
     * los convierte a coordenadas del visor sumando el rect ACTUAL del
     * iframe, que ya incluye el corrimiento del track. */
    var THRESHOLD_PX = 8;      // umbral para confirmar gesto horizontal
    var SNAP_RATIO = 0.22;     // fraccion de pantalla arrastrada que cambia de slide
    var FLICK_VELOCITY = 0.45; // px/ms: un flick corto y rapido tambien cambia
    var RUBBER = 0.32;         // resistencia al estirar mas alla de la primera/ultima

    // Un drag con mouse termina soltando sobre un link de la web: sin esto el
    // navegador emite click y navega. Se traga SOLO el click inmediato.
    function suppressNextClick(node) {
      function block(ev) {
        ev.stopPropagation();
        ev.preventDefault();
        node.removeEventListener("click", block, true);
      }
      node.addEventListener("click", block, true);
      setTimeout(function () { node.removeEventListener("click", block, true); }, 150);
    }

    function attachSwipe(target, capEl, toStageX, toStageY) {
      var dragging = false, captured = false, pointerId = null;
      var startX = 0, startY = 0, baseX = 0, posX = 0, w = 1;
      var samples = [];

      target.addEventListener("pointerdown", function (e) {
        if (dragging) return; // segundo dedo: se ignora
        if (e.pointerType === "mouse" && e.button !== 0) return;
        dragging = true;
        captured = false;
        pointerId = e.pointerId;
        startX = toStageX(e);
        startY = toStageY(e);
        w = stageWidth() || 1;
        samples = [];
      });

      target.addEventListener("pointermove", function (e) {
        if (!dragging || e.pointerId !== pointerId) return;
        if (e.pointerType === "mouse" && e.buttons === 0) { endDrag(e); return; }
        var x = toStageX(e);
        var deltaX = x - startX;
        var deltaY = toStageY(e) - startY;
        if (!captured) {
          if (Math.abs(deltaX) < THRESHOLD_PX || Math.abs(deltaX) < Math.abs(deltaY)) return;
          captured = true;
          baseX = currentX(); // agarra el track DONDE ESTE (aunque venga animando)
          track.style.transition = "none";
          if (capEl) { try { capEl.setPointerCapture(pointerId); } catch (_) {} }
        }
        posX = baseX + deltaX;
        // Rubber band: mas alla de las puntas el track sigue al dedo con
        // resistencia, y al soltar vuelve solo — nunca queda trabado afuera.
        var minX = -(n - 1) * w, maxX = 0;
        if (posX > maxX) posX = maxX + (posX - maxX) * RUBBER;
        else if (posX < minX) posX = minX + (posX - minX) * RUBBER;
        track.style.transform = "translate3d(" + posX + "px,0,0)";
        samples.push({ t: e.timeStamp, x: x });
        if (samples.length > 8) samples.shift();
        if (e.cancelable) e.preventDefault();
      });

      function endDrag(e) {
        if (!dragging || (e && e.pointerId !== pointerId)) return;
        dragging = false;
        if (!captured) return;
        captured = false;
        suppressNextClick(target);

        // Velocidad del gesto: delta sobre las muestras de los ultimos ~100ms.
        var vx = 0;
        var last = samples[samples.length - 1];
        for (var i = samples.length - 2; i >= 0; i--) {
          if (last.t - samples[i].t > 100) break;
          var dt = last.t - samples[i].t;
          if (dt > 0) vx = (last.x - samples[i].x) / dt;
        }

        // Snap: si el drag cruzo la mitad de otro slide, Math.round ya lo
        // elige; si no, decide el umbral de distancia o un flick rapido en la
        // MISMA direccion del desplazamiento. goTo clampea, asi que soltar en
        // una punta SIEMPRE vuelve a un slide valido.
        var raw = -posX / w;
        var target2 = Math.round(raw);
        if (target2 === index) {
          var progress = raw - index;
          if (progress > SNAP_RATIO || (vx < -FLICK_VELOCITY && progress > 0.02)) target2 = index + 1;
          else if (progress < -SNAP_RATIO || (vx > FLICK_VELOCITY && progress < -0.02)) target2 = index - 1;
        }
        goTo(target2);
      }

      target.addEventListener("pointerup", endDrag);
      target.addEventListener("pointercancel", endDrag);
    }

    attachSwipe(
      stage,
      stage,
      function (e) { return e.clientX; },
      function (e) { return e.clientY; }
    );

    /* Trackpad/rueda horizontal (desktop): dos dedos pasan de diseno. El
     * cooldown evita que la inercia del trackpad dispare varios saltos. */
    var WHEEL_STEP = 90;
    var wheelAcc = 0, wheelLock = false, wheelTimer = null;
    function onWheel(e) {
      if (Math.abs(e.deltaX) <= Math.abs(e.deltaY)) return; // scroll vertical: de la web
      if (e.cancelable) e.preventDefault();
      if (wheelLock) return;
      wheelAcc += e.deltaX;
      clearTimeout(wheelTimer);
      wheelTimer = setTimeout(function () { wheelAcc = 0; }, 180);
      if (Math.abs(wheelAcc) >= WHEEL_STEP) {
        goTo(index + (wheelAcc > 0 ? 1 : -1));
        wheelAcc = 0;
        wheelLock = true;
        setTimeout(function () { wheelLock = false; }, 450);
      }
    }
    stage.addEventListener("wheel", onWheel, { passive: false });

    // Puente same-origin: escucha los pointer events DENTRO del documento del
    // iframe y los resuelve con el mismo attachSwipe, mapeando coordenadas al
    // visor via el rect ACTUAL del iframe (ver nota arriba). Si el iframe
    // fuera cross-origin, contentDocument tira/da null y cae de forma segura
    // a flechas/teclado (sin swipe sobre ese slide en particular).
    function bridgeIframeSwipe(iframeEl) {
      try {
        var d = iframeEl.contentDocument;
        if (!d || d.__dcSwipe) return; // "load" puede re-disparar: no doble enganche
        d.__dcSwipe = true;
        d.documentElement.style.touchAction = "pan-y";
        attachSwipe(
          d,
          d.documentElement,
          function (e) { return e.clientX + iframeEl.getBoundingClientRect().left; },
          function (e) { return e.clientY + iframeEl.getBoundingClientRect().top; }
        );
        d.addEventListener("wheel", onWheel, { passive: false });
      } catch (_) {}
    }
    function whenIframeReady(iframeEl, cb) {
      function isReady() {
        try {
          return !!iframeEl.src && iframeEl.contentDocument &&
            iframeEl.contentDocument.readyState === "complete" &&
            iframeEl.contentDocument.location.href !== "about:blank";
        } catch (_) {
          return false;
        }
      }
      if (isReady()) {
        cb(iframeEl);
      } else {
        iframeEl.addEventListener("load", function () { cb(iframeEl); });
      }
    }

    /* Toggle "Ver con los colores de tu marca": arranca OFF (paleta original
     * de cada diseno). Cada pagina lleva su paleta ORIGINAL en `:root` y la de
     * MARCA en `:root[data-brand]`; el toggle no rehace NADA de disco, solo
     * manda el estado por postMessage (`dc-brand`, el listener lo inyecta
     * build-web via injectBrandToggle). El handshake `dc-brand-ready` es la
     * pieza clave con LAZY iframes: un slide que recien carga (data-src ->
     * src via ensureLoaded) avisa que arranco y se le contesta solo a EL el
     * estado actual — sin broadcast, para no reiniciar la transicion del
     * resto. */
    var brandBtn = document.getElementById("brandBtn");
    var brandToast = document.getElementById("brandToast");
    var brandOn = false;
    var toastTimer = null;
    var TOAST_MS = 2800;

    function showToast(text, warn) {
      brandToast.textContent = text;
      brandToast.classList.toggle("warn", !!warn);
      brandToast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () {
        brandToast.classList.remove("show");
      }, TOAST_MS);
    }

    function sendBrand(iframeEl) {
      if (!iframeEl || !iframeEl.contentWindow) return;
      try {
        iframeEl.contentWindow.postMessage({ type: "dc-brand", on: brandOn }, "*");
      } catch (e) {}
    }

    function broadcastBrand() {
      slides.forEach(function (slide) {
        sendBrand(slide.querySelector("iframe"));
      });
    }

    brandBtn.addEventListener("click", function () {
      brandOn = !brandOn;
      brandBtn.setAttribute("aria-pressed", String(brandOn));
      showToast(
        brandOn
          ? "Colores de tu marca: los detecta una IA a partir de tu tarjeta, pueden no ser exactos."
          : "Colores originales del diseño.",
        brandOn,
      );
      broadcastBrand();
    });

    addEventListener("message", function (e) {
      var d = e.data;
      if (!d || d.type !== "dc-brand-ready") return;
      for (var i = 0; i < slides.length; i++) {
        var ifr = slides[i].querySelector("iframe");
        if (ifr && ifr.contentWindow === e.source) {
          sendBrand(ifr);
          return;
        }
      }
    });

    /* ---------- burbuja de marca ARRASTRABLE (igual que el visor de digital
     * cards): arranca abajo del borde superior para no tapar el menu de la web,
     * y se puede reubicar. Si el gesto se mueve mas de DRAG_THRESHOLD es un DRAG
     * (mover) y se cancela el click (toggle). */
    var brandToggle = document.getElementById("brandToggle");
    var DRAG_THRESHOLD = 10;
    var bDown = false, bMoved = false, bPointer = null;
    var bStartX = 0, bStartY = 0, bOrigL = 0, bOrigT = 0;

    // El toast se abre hacia el lado libre de la pantalla (no siempre hacia la
    // izquierda) para que nunca se salga del viewport al crecer.
    function updateToastSide() {
      var r = brandToggle.getBoundingClientRect();
      var cx = r.left + r.width / 2;
      brandToggle.classList.toggle("toast-left", cx < innerWidth / 2);
    }
    updateToastSide();

    // El seguimiento se hace en `window` (no en el boton chico): un arrastre
    // rapido abandona el boton antes de superar el umbral; en window se sigue
    // igual aunque el puntero salga del boton.
    function onBrandMove(e) {
      if (!bDown || e.pointerId !== bPointer) return;
      var dxp = e.clientX - bStartX;
      var dyp = e.clientY - bStartY;
      if (!bMoved) {
        if (Math.abs(dxp) < DRAG_THRESHOLD && Math.abs(dyp) < DRAG_THRESHOLD) return;
        bMoved = true;
        brandToggle.classList.add("dragging");
      }
      var w = brandToggle.offsetWidth, h = brandToggle.offsetHeight;
      brandToggle.style.left = clamp(bOrigL + dxp, 6, innerWidth - w - 6) + "px";
      brandToggle.style.top = clamp(bOrigT + dyp, 6, innerHeight - h - 6) + "px";
      brandToggle.style.right = "auto";
      e.preventDefault();
    }
    function onBrandUp() {
      if (!bDown) return;
      bDown = false;
      brandToggle.classList.remove("dragging");
      removeEventListener("pointermove", onBrandMove);
      removeEventListener("pointerup", onBrandUp);
      removeEventListener("pointercancel", onBrandUp);
      updateToastSide();
    }
    brandBtn.addEventListener("pointerdown", function (e) {
      bDown = true;
      bMoved = false;
      bPointer = e.pointerId;
      bStartX = e.clientX;
      bStartY = e.clientY;
      var r = brandToggle.getBoundingClientRect();
      bOrigL = r.left;
      bOrigT = r.top;
      // Captura EXPLICITA: sin esto, apenas el puntero cruza sobre el iframe
      // (que ocupa toda la pantalla) los eventos van a SU documento y el padre
      // queda ciego — con mouse la burbuja se congelaba en pleno arrastre.
      // Touch ya capturaba implicito; esto empareja mouse/pen.
      try { brandBtn.setPointerCapture(e.pointerId); } catch (_) {}
      addEventListener("pointermove", onBrandMove);
      addEventListener("pointerup", onBrandUp);
      addEventListener("pointercancel", onBrandUp);
    });
    brandBtn.addEventListener("click", function (e) {
      if (bMoved) {
        bMoved = false;
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);

    /* ---------- vista guiada (coach-marks): mismo patron que el visor de
     * digital cards. Senala las zonas clave y ofrece volver a la tarjeta. */
    var TOUR_KEY = "web-tour-seen-v3";
    var steps = [
      { sel: null, title: "Tu página web", text: "Este es un ejemplo de cómo se vería tu propia página web, hecha a partir de tu tarjeta." },
      { sel: "#brandBtn", title: "Los colores de tu marca", text: "Con este botón ves la web con los colores de tu marca. Si te estorba, puedes arrastrarlo a otro lugar." },
      { sel: ".dock", title: "Cambiá de diseño", text: "Con las flechas pasás de una página a otra; el nombre y el contador te dicen cuál estás viendo y cuántas hay." },
      { sel: ".stage", hint: "swipe", title: "O deslizá con el dedo", text: "Deslizá de un lado a otro sobre la página, como en Instagram." },
      { sel: "#backDc", title: "Volver a tu tarjeta", text: "Cuando quieras, regresa a tu tarjeta digital desde este botón." }
    ];

    var tour = document.getElementById("tour");
    var tourSpot = document.getElementById("tourSpot");
    var tourPop = document.getElementById("tourPop");
    var tourTitle = document.getElementById("tourTitle");
    var tourText = document.getElementById("tourText");
    var tourDots = document.getElementById("tourDots");
    var tourNext = document.getElementById("tourNext");
    var tourSkip = document.getElementById("tourSkip");
    var helpBtn = document.getElementById("helpBtn");
    var swipeHint = document.getElementById("swipeHint");
    var tourStep = 0;

    steps.forEach(function () {
      var i = document.createElement("i");
      tourDots.appendChild(i);
    });
    var tourDotEls = Array.prototype.slice.call(tourDots.children);

    function placeTour() {
      var step = steps[tourStep];
      var target = step.sel ? document.querySelector(step.sel) : null;
      var rect = target && target.getBoundingClientRect();
      if (rect && rect.width) {
        tour.classList.remove("no-spot");
        var pad = 8;
        tourSpot.style.left = (rect.left - pad) + "px";
        tourSpot.style.top = (rect.top - pad) + "px";
        tourSpot.style.width = (rect.width + pad * 2) + "px";
        tourSpot.style.height = (rect.height + pad * 2) + "px";
        var popW = tourPop.offsetWidth, popH = tourPop.offsetHeight;
        var below = rect.bottom + pad + 12;
        var top = below + popH < innerHeight ? below : (rect.top - pad - 12 - popH);
        top = clamp(top, 10, innerHeight - popH - 10);
        var left = clamp(rect.left + rect.width / 2 - popW / 2, 10, innerWidth - popW - 10);
        tourPop.style.left = left + "px";
        tourPop.style.top = top + "px";
      } else {
        tour.classList.add("no-spot");
        var pw = tourPop.offsetWidth, ph = tourPop.offsetHeight;
        tourPop.style.left = clamp(innerWidth / 2 - pw / 2, 10, innerWidth - pw - 10) + "px";
        tourPop.style.top = clamp(innerHeight / 2 - ph / 2, 10, innerHeight - ph - 10) + "px";
      }
      tourTitle.textContent = step.title;
      tourText.textContent = step.text;
      tourNext.textContent = tourStep === steps.length - 1 ? "Entendido" : "Siguiente";
      tourDotEls.forEach(function (d, i) { d.classList.toggle("on", i === tourStep); });
      swipeHint.classList.toggle("on", step.hint === "swipe");
    }

    function openTour() {
      tourStep = 0;
      tour.classList.add("open");
      placeTour();
    }
    function closeTour() {
      tour.classList.remove("open");
      try { localStorage.setItem(TOUR_KEY, "1"); } catch (_) {}
    }

    tourNext.addEventListener("click", function () {
      if (tourStep >= steps.length - 1) { closeTour(); return; }
      tourStep++;
      placeTour();
    });
    tourSkip.addEventListener("click", closeTour);
    helpBtn.addEventListener("click", openTour);

    addEventListener("resize", function () {
      // El track esta en px: al rotar/redimensionar se re-asienta sin animar.
      setX(-index * stageWidth(), false);
      updateToastSide();
      if (tour.classList.contains("open")) placeTour();
    });

    var tourSeen = false;
    try { tourSeen = localStorage.getItem(TOUR_KEY) === "1"; } catch (_) {}
    if (!tourSeen) setTimeout(openTour, 550);

    goTo(0, false); // primera carga: pinta HUD + carga la visible y su adyacente
  })();
  </script>
</body>
</html>
