<!DOCTYPE html>
<!--
  _motifs.html · LIBRERIA DE MOTIVOS POR RUBRO (no entra al pool: prefijo _)
  ==========================================================================
  Cada bloque de abajo es un motivo completo, listo para pegar en cualquier
  diseño del pool (celeste, vitrina, rotulo, seda, redondo, lienzo).

  COMO CAMBIAR EL RUBRO DE UN DISEÑO:
  1. Abrir el .html del diseño y ubicar los marcadores MOTIF:START / MOTIF:END.
  2. Borrar ese bloque completo (de START a END inclusive).
  3. Copiar de este archivo el bloque del rubro deseado (de START a END) y pegarlo
     en el mismo lugar. Nada más: el wrapper <div class="motif"> y las clases
     .m1-.m5 son idénticos en todos los bloques; el CSS del diseño ya sabe
     posicionarlos y teñirlos (currentColor → paleta de la marca).

  Convención de sprites (aplica a los 6 rubros):
    .m1 = pieza protagonista (la más grande) · .m2-.m5 = piezas de apoyo.
  Todos los SVG: viewBox 0 0 100 100, trazo currentColor, sin colores fijos.
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Librería de motivos por rubro</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:#f4f3ef;color:#232323;padding:32px 20px 60px}
h1{font-size:20px;margin:0 0 4px}
p.note{margin:0 0 28px;font-size:13px;color:#777;max-width:60ch}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;max-width:1100px}
.card{background:#fff;border:1px solid #e2e0d8;border-radius:14px;padding:18px}
.card h2{margin:0 0 12px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8a8a84}
/* solo para esta galería: los diseños reales posicionan .m1-.m5 con su propio CSS */
.card .motif{position:relative;display:flex;flex-wrap:wrap;gap:14px;align-items:center;color:#4a4f7a}
.card .m{width:64px;height:64px}
.card .m1{width:84px;height:84px}
</style>
</head>
