<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tarjeta digital — vista previa</title>
<style>
  /*
   * Visor swipeable de digital cards. Cada diseno se carga a pantalla
   * completa TAL CUAL quedaria en producto (mismo iframe, sin marco de
   * telefono ni chrome extra); flechas/dots flotan ENCIMA como overlay, no
   * dentro de un mockup ni tapando el header del diseno. Sin bucle: al llegar
   * a una punta el boton de avance correspondiente queda disabled, no da
   * vuelta al otro lado. El primer slide real es siempre el diseno del rubro
   * del lead (`orderPoolByRubro` en build-cards.ts).
   */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden}
  body{
    background:#000;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }

  /* ---------- carrusel a pantalla completa (el producto real) ---------- */
  .stage{position:fixed;inset:0;overflow:hidden;touch-action:pan-y}
  .track{
    display:flex;
    width:100%;height:100%;
    transition:transform .45s cubic-bezier(.22,.75,.3,1);
    will-change:transform;
  }
  .slide{flex:0 0 100%;height:100%;background:#fff}
  .slide iframe{width:100%;height:100%;border:0;display:block}

  /* ---------- overlay: flotan encima del producto, no lo envuelven ---------- */
  .hud{position:fixed;inset:0;z-index:10;pointer-events:none}

  .nav{
    position:absolute;
    top:50%;transform:translateY(-50%);
    pointer-events:auto;
    display:grid;place-items:center;
    width:34px;height:34px;
    border:none;
    background:transparent;
    color:rgb(255 255 255 / 0.88);
    filter:drop-shadow(0 1px 2px rgb(0 0 0 / 0.55)) drop-shadow(0 0 6px rgb(0 0 0 / 0.22));
    cursor:pointer;
    transition:opacity .2s ease,transform .2s ease;
  }
  .nav-prev{left:max(6px,env(safe-area-inset-left))}
  .nav-next{right:max(6px,env(safe-area-inset-right))}
  .nav:hover{transform:translateY(-50%) scale(1.1)}
  .nav:active{transform:translateY(-50%) scale(.9)}
  .nav:disabled{opacity:.22;cursor:default;pointer-events:none}
  .nav svg{width:26px;height:26px}

  .dots{
    position:absolute;
    bottom:max(16px,env(safe-area-inset-bottom));
    left:50%;transform:translateX(-50%);
    pointer-events:auto;
    display:flex;gap:7px;align-items:center;
    padding:8px 10px;
    border-radius:999px;
    background:rgb(15 15 18 / 0.45);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    border:none;padding:0;
    background:rgb(255 255 255 / 0.35);
    cursor:pointer;
    transition:background .2s ease,transform .2s ease,opacity .2s ease;
  }
  .dot.active{background:#f2f1ee;transform:scale(1.3)}
  /* dot en el borde de la ventana visible (hay mas fuera, hacia ese lado):
     se ve mas chico/atenuado en vez de listar TODOS los disenos del pool. */
  .dot.edge{transform:scale(.55);opacity:.45}

  /* ---------- toggle "Ver con los colores de tu marca" (icono compacto,
     el aviso aparece como toast y se apaga solo — no tapa el header).
     Arranca MAS ABAJO del borde superior (para no tapar el boton de menu
     "sandwich" que muchos disenos ponen arriba a la derecha) y es una BURBUJA
     ARRASTRABLE: el cliente puede reubicarla si le estorba (ver drag JS). ---- */
  .brand-toggle{
    position:absolute;
    top:calc(max(10px,env(safe-area-inset-top)) + 68px);
    right:max(10px,env(safe-area-inset-right));
    pointer-events:auto;
    display:flex;flex-direction:column;align-items:flex-end;gap:8px;
    touch-action:none; /* el drag maneja el gesto; no scroll/zoom nativo */
  }
  .brand-toggle.dragging{transition:none}
  .brand-toggle.dragging .brand-btn{cursor:grabbing;transform:scale(1.06)}
  .brand-btn{
    width:38px;height:38px;flex:none;
    border-radius:50%;
    display:grid;place-items:center;
    border:1px solid rgb(255 255 255 / 0.22);
    background:rgb(15 15 18 / 0.45);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    color:#f2f1ee;
    cursor:grab;
    touch-action:none;
    transition:background .2s ease,transform .2s ease;
  }
  .brand-btn:hover{background:rgb(15 15 18 / 0.65)}
  .brand-btn:active{transform:scale(.92)}
  .brand-btn[aria-pressed="true"]{background:#3d6fd6;border-color:transparent}
  .brand-btn svg{width:18px;height:18px}
  .brand-toast{
    margin:0;
    max-width:min(230px,68vw);
    padding:7px 12px;
    border-radius:12px;
    border:1px solid rgb(255 255 255 / 0.16);
    background:rgb(15 15 18 / 0.75);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    color:#f2f1ee;
    font-size:11px;
    line-height:1.35;
    text-align:right;
    opacity:0;
    transform:translateY(-4px);
    pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;
  }
  .brand-toast.show{opacity:1;transform:translateY(0)}
  .brand-toast.warn{border-color:rgb(255 200 120 / 0.32);background:rgb(140 60 10 / 0.75);color:#fff3e0}

  /* ---------- boton "?" para reabrir la vista guiada (esquina inferior
     izquierda, zona libre; el resto del HUD esta a la derecha/centro) ------- */
  .help-btn{
    position:absolute;
    bottom:max(16px,env(safe-area-inset-bottom));
    left:max(10px,env(safe-area-inset-left));
    pointer-events:auto;
    width:34px;height:34px;
    border-radius:50%;
    display:grid;place-items:center;
    border:1px solid rgb(255 255 255 / 0.22);
    background:rgb(15 15 18 / 0.45);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    color:#f2f1ee;
    font:600 16px/1 system-ui,sans-serif;
    cursor:pointer;
    transition:background .2s ease,transform .2s ease;
  }
  .help-btn:hover{background:rgb(15 15 18 / 0.65)}
  .help-btn:active{transform:scale(.92)}

  /* ---------- vista guiada (coach-marks): overlay oscuro con un "reflector"
     (spotlight) sobre el elemento del paso + globo con el texto. El reflector
     es un div transparente con un box-shadow gigante que oscurece TODO menos
     su hueco; su posicion/tamano se calcula por JS con getBoundingClientRect
     (asi sigue a la burbuja de marca aunque el cliente la haya arrastrado).
     Pasos sin objetivo (intro) usan `.no-spot`: se oculta el reflector y el
     overlay se oscurece entero. --------------------------------------------- */
  .tour{position:fixed;inset:0;z-index:50;pointer-events:auto;display:none}
  .tour.open{display:block}
  .tour.no-spot{background:rgb(6 6 10 / 0.72)}
  .tour-spot{
    position:absolute;left:0;top:0;width:0;height:0;
    border-radius:16px;
    box-shadow:0 0 0 9999px rgb(6 6 10 / 0.72);
    transition:all .32s cubic-bezier(.22,.75,.3,1);
    pointer-events:none;
  }
  .tour.no-spot .tour-spot{display:none}
  .tour-pop{
    position:absolute;
    width:min(300px,84vw);
    padding:16px 16px 12px;
    border-radius:16px;
    border:1px solid rgb(255 255 255 / 0.14);
    background:rgb(20 20 24 / 0.94);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    color:#f2f1ee;
    box-shadow:0 12px 40px rgb(0 0 0 / 0.5);
    transition:top .3s ease,left .3s ease;
  }
  .tour-title{margin:0 0 5px;font-size:15px;font-weight:700;letter-spacing:.01em}
  .tour-text{margin:0;font-size:13px;line-height:1.45;color:rgb(242 241 238 / 0.82)}
  .tour-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .tour-dots{display:flex;gap:6px;align-items:center}
  .tour-dots i{width:6px;height:6px;border-radius:50%;background:rgb(255 255 255 / 0.28);transition:background .2s,transform .2s}
  .tour-dots i.on{background:#f2f1ee;transform:scale(1.3)}
  .tour-skip{
    border:none;background:transparent;padding:6px 2px;
    color:rgb(242 241 238 / 0.55);font-size:12px;cursor:pointer;
  }
  .tour-skip:hover{color:rgb(242 241 238 / 0.85)}
  .tour-next{
    border:none;border-radius:999px;
    padding:8px 16px;
    background:#3d6fd6;color:#fff;
    font-size:13px;font-weight:600;cursor:pointer;
    transition:background .2s,transform .2s;
  }
  .tour-next:hover{background:#2f5ec0}
  .tour-next:active{transform:scale(.95)}

  @media (prefers-reduced-motion: reduce){
    .track{transition:none}
    .dot,.nav,.brand-btn,.tour-spot,.tour-pop{transition:none}
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="track">
      {{#cards}}
      <div class="slide" data-name="{{name}}" data-audience="{{audience}}">
        <iframe src="{{file}}" title="{{name}}" loading="lazy"></iframe>
      </div>
      {{/cards}}
    </div>
  </div>

  <div class="hud">
    <button class="nav nav-prev" type="button" aria-label="Diseño anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="nav nav-next" type="button" aria-label="Siguiente diseño">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div class="dots" role="tablist" aria-label="Diseños disponibles"></div>

    <div class="brand-toggle" id="brandToggle">
      <button type="button" class="brand-btn" id="brandBtn" aria-pressed="false" aria-label="Ver con los colores de tu marca">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a9 9 0 1 0 0 18c1.4 0 2-.9 2-1.9 0-.5-.2-.9-.6-1.3-.4-.4-.5-.9-.2-1.4.3-.5.9-.6 1.5-.6H16a4 4 0 0 0 4-4c0-5-3.6-8.8-8-8.8Z"/><circle cx="7.5" cy="10.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="10.3" cy="7" r="1.15" fill="currentColor" stroke="none"/><circle cx="14.3" cy="7.3" r="1.15" fill="currentColor" stroke="none"/><circle cx="16.8" cy="10.8" r="1.15" fill="currentColor" stroke="none"/></svg>
      </button>
      <p class="brand-toast" id="brandToast" role="status"></p>
    </div>

    <button type="button" class="help-btn" id="helpBtn" aria-label="Ver la guía de nuevo">?</button>
  </div>

  <!-- Vista guiada (coach-marks). El texto de cada paso vive en el JS; el
       ultimo paso (ejemplos de web) solo se agrega si el lead ya tiene su
       mini-web generada (hasGeneratedWeb). -->
  <div class="tour" id="tour" role="dialog" aria-modal="true" aria-label="Guía rápida">
    <div class="tour-spot" id="tourSpot"></div>
    <div class="tour-pop" id="tourPop">
      <p class="tour-title" id="tourTitle"></p>
      <p class="tour-text" id="tourText"></p>
      <div class="tour-actions">
        <button type="button" class="tour-skip" id="tourSkip">Saltar</button>
        <div class="tour-dots" id="tourDots" aria-hidden="true"></div>
        <button type="button" class="tour-next" id="tourNext">Siguiente</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var stage = document.querySelector(".stage");
    var track = document.querySelector(".track");
    var realSlides = Array.prototype.slice.call(track.children);
    var dotsWrap = document.querySelector(".dots");
    var prevBtn = document.querySelector(".nav-prev");
    var nextBtn = document.querySelector(".nav-next");
    var n = realSlides.length;

    /* Sin bucle: index va de 0 a n-1 nomas. Al llegar a una punta el boton
     * correspondiente se deshabilita (disabled), no da vuelta al otro lado. */
    var index = 0;

    /* Ventana de dots: con pools grandes (14 disenos) listar un dot por
     * diseno da una barra larga. Se muestran como maximo DOT_WINDOW_RADIUS*2+1
     * (hoy 3: el activo + 1 a cada lado); el resto queda oculto. El dot en la
     * punta de la ventana se ve mas chico/atenuado (.edge) SOLO si de verdad
     * hay mas disenos de ese lado — en la primera/ultima diapositiva esa
     * punta desaparece, asi se nota que no hay mas para ese lado. */
    var DOT_WINDOW_RADIUS = 1;

    realSlides.forEach(function (slide, i) {
      var dot = document.createElement("button");
      dot.type = "button";
      dot.className = "dot";
      dot.setAttribute("role", "tab");
      dot.setAttribute("aria-label", "Ver " + (slide.dataset.name || "diseño " + (i + 1)));
      dot.addEventListener("click", function () {
        goTo(i);
      });
      dotsWrap.appendChild(dot);
    });
    var dots = Array.prototype.slice.call(dotsWrap.children);

    function paint(withTransition) {
      track.style.transition = withTransition === false ? "none" : "transform .45s cubic-bezier(.22,.75,.3,1)";
      track.style.transform = "translateX(" + index * -100 + "%)";

      var windowSize = DOT_WINDOW_RADIUS * 2 + 1;
      var lo = n <= windowSize ? 0 : Math.max(0, Math.min(index - DOT_WINDOW_RADIUS, n - windowSize));
      var hi = Math.min(n - 1, lo + windowSize - 1);
      dots.forEach(function (d, i) {
        var inWindow = i >= lo && i <= hi;
        d.style.display = inWindow ? "" : "none";
        d.classList.toggle("active", i === index);
        d.classList.toggle("edge", inWindow && ((i === lo && lo > 0) || (i === hi && hi < n - 1)));
      });

      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === n - 1;
    }

    // Cerrojo anti doble-click: mientras "animating" es true se ignora
    // cualquier next/prev/teclado nuevo, para no pisar la transicion en curso.
    var animating = false;

    function goTo(i) {
      if (animating) return;
      if (i < 0 || i > n - 1) return;
      animating = true;
      index = i;
      if (document.startViewTransition) {
        document.startViewTransition(function () {
          paint(true);
        });
      } else {
        paint(true);
      }
    }

    track.addEventListener("transitionend", function (e) {
      if (e.target !== track) return;
      animating = false;
    });

    prevBtn.addEventListener("click", function () {
      goTo(index - 1);
    });
    nextBtn.addEventListener("click", function () {
      goTo(index + 1);
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "ArrowLeft") goTo(index - 1);
      if (e.key === "ArrowRight") goTo(index + 1);
    });

    /* Swipe: pointerdown arranca el seguimiento; recien si el gesto se
     * confirma horizontal (supera el umbral) se llama setPointerCapture,
     * asi un tap normal sobre un boton DENTRO de la card (wa.me, tel:,
     * mailto:) llega intacto al iframe en vez de ser interceptado. */
    var dragging = false, captured = false, pointerId = null;
    var startX = 0, startY = 0, dx = 0, stageWidth = 0;
    var THRESHOLD_PX = 8;
    var SWIPE_RATIO = 0.18;

    track.addEventListener("pointerdown", function (e) {
      dragging = true;
      captured = false;
      pointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      dx = 0;
      stageWidth = stage.getBoundingClientRect().width;
    });

    track.addEventListener("pointermove", function (e) {
      if (!dragging || e.pointerId !== pointerId) return;
      var deltaX = e.clientX - startX;
      var deltaY = e.clientY - startY;
      if (!captured) {
        if (Math.abs(deltaX) < THRESHOLD_PX || Math.abs(deltaX) < Math.abs(deltaY)) return;
        captured = true;
        track.setPointerCapture(pointerId);
        track.style.transition = "none";
      }
      dx = deltaX;
      track.style.transform = "translateX(calc(" + index * -100 + "% + " + dx + "px))";
      e.preventDefault();
    });

    function endDrag() {
      if (!dragging) return;
      dragging = false;
      if (!captured) return;
      captured = false;
      var moved = -dx > stageWidth * SWIPE_RATIO ? 1 : dx > stageWidth * SWIPE_RATIO ? -1 : 0;
      goTo(index + moved);
    }

    track.addEventListener("pointerup", endDrag);
    track.addEventListener("pointercancel", endDrag);
    track.addEventListener("pointerleave", function () {
      if (dragging && !captured) dragging = false;
    });

    /* Toggle "Ver con los colores de tu marca": arranca OFF (colores
     * originales de cada diseno). Cada card lleva su propia paleta en
     * `:root` (original) y `:root[data-brand]` (marca); el toggle no rehace
     * NADA de disco, solo le manda el estado por postMessage a los iframes.
     * Compacto (icono, esquina) para no tapar el header de la card; el aviso
     * de "colores por IA" aparece como toast flotante y se apaga solo, no
     * queda fijo en pantalla. `dc-brand-ready` cubre a los que cargan lazy
     * al hacer swipe: cuando avisan que arrancaron, se les contesta solo a
     * ELLOS el estado actual (no un broadcast a todos, para no reiniciar la
     * transicion del resto). */
    var brandBtn = document.getElementById("brandBtn");
    var brandToast = document.getElementById("brandToast");
    var brandOn = false;
    var toastTimer = null;
    var TOAST_MS = 2800;

    function showToast(text, warn) {
      brandToast.textContent = text;
      brandToast.classList.toggle("warn", !!warn);
      brandToast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () {
        brandToast.classList.remove("show");
      }, TOAST_MS);
    }

    function sendBrand(iframeEl) {
      if (!iframeEl || !iframeEl.contentWindow) return;
      try {
        iframeEl.contentWindow.postMessage({ type: "dc-brand", on: brandOn }, "*");
      } catch (e) {}
    }

    function broadcastBrand() {
      realSlides.forEach(function (slide) {
        sendBrand(slide.querySelector("iframe"));
      });
    }

    brandBtn.addEventListener("click", function () {
      brandOn = !brandOn;
      brandBtn.setAttribute("aria-pressed", String(brandOn));
      showToast(
        brandOn
          ? "Colores de tu marca: los detecta una IA a partir de tu tarjeta, pueden no ser exactos."
          : "Colores originales del diseño.",
        brandOn,
      );
      broadcastBrand();
    });

    addEventListener("message", function (e) {
      var d = e.data;
      if (!d || d.type !== "dc-brand-ready") return;
      for (var i = 0; i < realSlides.length; i++) {
        var ifr = realSlides[i].querySelector("iframe");
        if (ifr && ifr.contentWindow === e.source) {
          sendBrand(ifr);
          return;
        }
      }
    });

    /* ---------- burbuja de marca ARRASTRABLE ----------
     * El boton de colores arranca abajo del borde superior (CSS) para no tapar
     * el boton de menu de los disenos. Ademas se puede reubicar arrastrando:
     * si el gesto se mueve mas de DRAG_THRESHOLD es un DRAG (mover) y NO un
     * click (toggle); asi un tap sigue prendiendo/apagando los colores. Se
     * reposiciona con left/top absolutos (se descarta el anclaje `right` del
     * CSS) clampeado adentro de la ventana. */
    var brandToggle = document.getElementById("brandToggle");
    var DRAG_THRESHOLD = 6;
    var bDown = false, bMoved = false, bPointer = null;
    var bStartX = 0, bStartY = 0, bOrigL = 0, bOrigT = 0;

    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

    // El seguimiento del movimiento se hace en `window` (no en el boton): el
    // boton es chico (38px) y un arrastre rapido lo abandona antes de superar
    // el umbral. Escuchando en window el gesto se sigue igual aunque el puntero
    // salga del boton.
    function onBrandMove(e) {
      if (!bDown || e.pointerId !== bPointer) return;
      var dxp = e.clientX - bStartX;
      var dyp = e.clientY - bStartY;
      if (!bMoved) {
        if (Math.abs(dxp) < DRAG_THRESHOLD && Math.abs(dyp) < DRAG_THRESHOLD) return;
        bMoved = true;
        brandToggle.classList.add("dragging");
      }
      var w = brandToggle.offsetWidth, h = brandToggle.offsetHeight;
      brandToggle.style.left = clamp(bOrigL + dxp, 6, innerWidth - w - 6) + "px";
      brandToggle.style.top = clamp(bOrigT + dyp, 6, innerHeight - h - 6) + "px";
      brandToggle.style.right = "auto";
      e.preventDefault();
    }
    function onBrandUp() {
      if (!bDown) return;
      bDown = false;
      brandToggle.classList.remove("dragging");
      removeEventListener("pointermove", onBrandMove);
      removeEventListener("pointerup", onBrandUp);
      removeEventListener("pointercancel", onBrandUp);
    }
    brandBtn.addEventListener("pointerdown", function (e) {
      bDown = true;
      bMoved = false;
      bPointer = e.pointerId;
      bStartX = e.clientX;
      bStartY = e.clientY;
      var r = brandToggle.getBoundingClientRect();
      bOrigL = r.left;
      bOrigT = r.top;
      addEventListener("pointermove", onBrandMove);
      addEventListener("pointerup", onBrandUp);
      addEventListener("pointercancel", onBrandUp);
    });
    // Si el gesto fue un DRAG, cancelamos el click que el navegador emite al
    // soltar, para que reubicar la burbuja no dispare el toggle de colores.
    brandBtn.addEventListener("click", function (e) {
      if (bMoved) {
        bMoved = false;
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);

    /* ---------- vista guiada (coach-marks) ----------
     * Recorre unos pocos pasos senalando las zonas clave del visor. Cada paso
     * apunta a un elemento (sel) o va centrado (intro/web). El reflector y el
     * globo se posicionan por getBoundingClientRect en cada paso, asi siguen a
     * la burbuja de marca aunque el cliente la haya movido. Arranca solo la
     * primera vez (localStorage); el boton "?" la reabre siempre. */
    var TOUR_KEY = "dc-tour-seen-v1";
    var steps = [
      { sel: null, title: "Tu tarjeta digital", text: "Este es un ejemplo de cómo se vería tu tarjeta digital, lista para compartir por WhatsApp o redes." },
      { sel: "#brandBtn", title: "Los colores de tu marca", text: "Con este botón puedes ver cómo se vería el diseño con los colores de tu marca. Puedes arrastrarlo si te estorba." },
      { sel: ".dots", title: "Otros diseños", text: "Aquí puedes ver otros diseños: desliza a los lados o usa las flechas para elegir el que más te guste." },
      {{#hasGeneratedWeb}}{ sel: null, title: "Tu propia página web", text: "Y te hicimos unos ejemplos de cómo se vería tu propia página web: ábrelos con el botón «Ver mi sitio» dentro de tu tarjeta." },{{/hasGeneratedWeb}}
    ];

    var tour = document.getElementById("tour");
    var tourSpot = document.getElementById("tourSpot");
    var tourPop = document.getElementById("tourPop");
    var tourTitle = document.getElementById("tourTitle");
    var tourText = document.getElementById("tourText");
    var tourDots = document.getElementById("tourDots");
    var tourNext = document.getElementById("tourNext");
    var tourSkip = document.getElementById("tourSkip");
    var helpBtn = document.getElementById("helpBtn");
    var tourStep = 0;

    steps.forEach(function () {
      var i = document.createElement("i");
      tourDots.appendChild(i);
    });
    var tourDotEls = Array.prototype.slice.call(tourDots.children);

    function placeTour() {
      var step = steps[tourStep];
      var target = step.sel ? document.querySelector(step.sel) : null;
      var rect = target && target.getBoundingClientRect();
      if (rect && rect.width) {
        tour.classList.remove("no-spot");
        var pad = 8;
        tourSpot.style.left = (rect.left - pad) + "px";
        tourSpot.style.top = (rect.top - pad) + "px";
        tourSpot.style.width = (rect.width + pad * 2) + "px";
        tourSpot.style.height = (rect.height + pad * 2) + "px";
        // Globo: abajo del objetivo si cabe, si no arriba; centrado y clampeado.
        var popW = tourPop.offsetWidth, popH = tourPop.offsetHeight;
        var below = rect.bottom + pad + 12;
        var top = below + popH < innerHeight ? below : (rect.top - pad - 12 - popH);
        top = clamp(top, 10, innerHeight - popH - 10);
        var left = clamp(rect.left + rect.width / 2 - popW / 2, 10, innerWidth - popW - 10);
        tourPop.style.left = left + "px";
        tourPop.style.top = top + "px";
      } else {
        tour.classList.add("no-spot");
        var pw = tourPop.offsetWidth, ph = tourPop.offsetHeight;
        tourPop.style.left = clamp(innerWidth / 2 - pw / 2, 10, innerWidth - pw - 10) + "px";
        tourPop.style.top = clamp(innerHeight / 2 - ph / 2, 10, innerHeight - ph - 10) + "px";
      }
      tourTitle.textContent = step.title;
      tourText.textContent = step.text;
      tourNext.textContent = tourStep === steps.length - 1 ? "Entendido" : "Siguiente";
      tourDotEls.forEach(function (d, i) { d.classList.toggle("on", i === tourStep); });
    }

    function openTour() {
      tourStep = 0;
      tour.classList.add("open");
      placeTour();
    }
    function closeTour() {
      tour.classList.remove("open");
      try { localStorage.setItem(TOUR_KEY, "1"); } catch (_) {}
    }

    tourNext.addEventListener("click", function () {
      if (tourStep >= steps.length - 1) { closeTour(); return; }
      tourStep++;
      placeTour();
    });
    tourSkip.addEventListener("click", closeTour);
    helpBtn.addEventListener("click", openTour);
    addEventListener("resize", function () { if (tour.classList.contains("open")) placeTour(); });

    var tourSeen = false;
    try { tourSeen = localStorage.getItem(TOUR_KEY) === "1"; } catch (_) {}
    if (!tourSeen) setTimeout(openTour, 550);

    paint(false);
  })();
  </script>
</body>
</html>
