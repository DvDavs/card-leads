server {
    listen 80;
    listen [::]:80;
    server_name cards.kronet.app;

    root /var/www/cards;
    index index.html;

    # Raiz oculta: recortar la URL no revela nada.
    location = / { return 404; }

    # Nada de indexado por buscadores (demos + panel).
    add_header X-Robots-Tag "noindex, nofollow" always;
    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
