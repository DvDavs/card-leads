server {
    listen 80;
    listen [::]:80;
    server_name panel.kronet.app;

    # Nada de indexado (herramienta interna).
    add_header X-Robots-Tag "noindex, nofollow" always;
    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Uploads de fotos de tarjeta: margen sobre el limite de 12MB del server
    # (src/panel/services/uploads.ts).
    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (progreso de build-cards/enrich/build-web/deploy): sin buffer,
        # sin timeout corto, si no los eventos quedan retenidos por nginx.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout 120s;
    }
}
